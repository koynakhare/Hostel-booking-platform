spring.config.import=optional:file:.env[.properties]

# App name
spring.application.name=hostel-booking-platform

# ===== MySQL Database Config =====
# Local: uses localhost. Production (Render): set SPRING_DATASOURCE_URL to your cloud MySQL URL.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/hostel_booking_db?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate Config =====
# update = tables auto create/alter on startup (local)
# On Render/FreeSQLDatabase: set SQL_INIT_MODE=always and DDL_AUTO=none
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=${SQL_INIT_MODE:never}
spring.sql.init.schema-locations=classpath:schema.sql
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== Server Config =====
server.port=${PORT:8822}

# ===== JWT Config =====
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ===== File Upload Config =====
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

file.upload-dir=uploads/hostels

# ===== Cloudinary Config =====
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ===== Payment Gateway Config =====
razorpay.key-id=${RAZORPAY_KEY_ID:}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:}
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
payment.currency=INR
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
